<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIKO CMS | Admin Access</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/styles.css">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0B0B0B 0%, #1E0708 50%, #0B0B0B 100%);
            font-family: var(--font-sans), 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }
        
        .login-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 168, 106, 0.15);
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(201, 168, 106, 0.05);
            text-align: center;
            border-radius: 0; /* Align with Riko's sharp edge editorial styling */
            animation: cardEntrance 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        
        .logo-circle {
            width: 72px;
            height: 72px;
            margin: 0 auto 25px;
            border: 1px solid rgba(201, 168, 106, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(11, 11, 11, 0.8);
            box-shadow: 0 0 25px rgba(201, 168, 106, 0.1);
        }
        
        .logo-circle img {
            width: 52px;
            height: 52px;
            object-fit: contain;
        }
        
        .login-title {
            font-family: var(--font-serif), 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-white);
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--color-gold);
            margin-bottom: 35px;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }
        
        .input-label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #8E8E8E;
            margin-bottom: 8px;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(11, 11, 11, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
            font-family: var(--font-sans), sans-serif;
            font-size: 0.95rem;
            letter-spacing: 0.25em;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .password-input:focus {
            outline: none;
            border-color: var(--color-gold);
            box-shadow: 0 0 15px rgba(201, 168, 106, 0.15);
            background: rgba(11, 11, 11, 0.9);
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8E8E8E;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }
        
        .toggle-password:hover {
            color: var(--color-gold);
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--color-gold);
            color: #0B0B0B;
            border: 1px solid var(--color-gold);
            font-family: var(--font-sans), sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: transparent;
            color: var(--color-gold);
            box-shadow: 0 0 25px rgba(201, 168, 106, 0.2);
        }
        
        .error-message {
            background: rgba(90, 22, 25, 0.2);
            border: 1px solid rgba(90, 22, 25, 0.6);
            color: #FFB3B7;
            padding: 12px 16px;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            margin-bottom: 25px;
            display: none;
            text-align: left;
            border-radius: 0;
            animation: shake 0.4s ease;
        }
        
        .error-message i {
            margin-right: 8px;
        }
        
        @keyframes cardEntrance {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-circle">
                <img src="/assets/riko_logo_circular.png" alt="Riko Crest">
            </div>
            <h1 class="login-title">Riko</h1>
            <div class="login-subtitle">CMS Engine</div>
            
            <form id="loginForm" method="POST" action="/admin">
                <div class="error-message" id="errorBox">
                    <i class="fa-solid fa-circle-exclamation"></i> <span id="errorText">Invalid authentication token.</span>
                </div>
                
                <div class="input-group">
                    <label class="input-label" for="password">Security Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" class="password-input" required autofocus placeholder="••••••••">
                        <button type="button" class="toggle-password" id="togglePasswordBtn">
                            <i class="fa-regular fa-eye-slash" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">Authenticate</button>
            </form>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const toggleIcon = document.getElementById('toggleIcon');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            if (type === 'password') {
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Show server-side errors if passed in template context
        {% if error %}
            errorText.textContent = "{{ error }}";
            errorBox.style.display = "block";
        {% endif %}

        // Simple form submitting animation
        loginForm.addEventListener('submit', () => {
            submitBtn.textContent = "Verifying...";
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.7';
        });
    </script>
</body>
</html>
